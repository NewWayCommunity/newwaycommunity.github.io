<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore a maior curadoria de jogos mobile e emuladores de alta performance.">
  <meta name="author" content="Koval Lamb">

  <title>New Way Community</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <script type="module" src="https://esm.run/@material/web/all.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="css/light.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="header-content">
    <h1>New Way Community</h1>

    <div style="display: flex; gap: 8px; align-items: center;">
      <md-icon-button onclick="handleAuthAction()">
        <md-icon id="auth-icon">admin_panel_settings</md-icon>
      </md-icon-button>

      <md-icon-button onclick="cycleTheme()">
        <md-icon id="theme-icon">brightness_auto</md-icon>
      </md-icon-button>
    </div>
  </div>
</header>

<!-- 🔎 PESQUISA + CATEGORIA -->
<div class="search-bar" style="display:flex; gap:10px; flex-wrap:wrap; padding:16px;">

  <md-outlined-text-field id="search" label="Pesquisar jogos..." oninput="renderGames()" style="flex:1;">
    <md-icon slot="leading-icon">search</md-icon>
  </md-outlined-text-field>

  <!-- 🔥 NOVO: FILTRO DE CATEGORIA -->
  <md-outlined-select id="categoryFilter" label="Categoria" onchange="renderGames()" style="min-width:180px;">
    <md-select-option value="">Todas</md-select-option>
  </md-outlined-select>

</div>

<main class="games-grid" id="games">
  <div style="grid-column: 1 / -1; display: flex; justify-content: center; padding: 48px;">
    <md-circular-progress indeterminate></md-circular-progress>
  </div>
</main>

<!-- BOTÃO ADD -->
<md-fab id="add-btn" onclick="openAddModal()" style="display: none;">
  <md-icon slot="icon">add</md-icon>
</md-fab>

<!-- LOGIN -->
<div class="modal-overlay" id="login-modal">
  <md-elevated-card class="modal-content">
    <h2 style="margin:0 0 16px 0">Acesso Administrativo</h2>

    <md-outlined-text-field id="login-email" label="Email"></md-outlined-text-field>
    <md-outlined-text-field id="login-pass" label="Senha" type="password"></md-outlined-text-field>

    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px">
      <md-text-button onclick="closeLoginModal()">Cancelar</md-text-button>
      <md-filled-button onclick="login()">Entrar</md-filled-button>
    </div>
  </md-elevated-card>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <md-elevated-card class="modal-content">

    <h2 id="modalTitle">Adicionar Jogo</h2>

    <form id="gameForm" onsubmit="event.preventDefault()">

      <input type="hidden" id="gameId">

      <md-outlined-text-field id="name" label="Nome"></md-outlined-text-field>

      <md-outlined-text-field id="desc" label="Descrição"></md-outlined-text-field>

      <!-- 🔥 NOVO CAMPO CATEGORIA -->
      <md-outlined-text-field id="category" label="Categoria"></md-outlined-text-field>

      <div id="linksWrapper">
        <p style="font-size:14px; opacity:0.7;">Links (máx 4)</p>
        <div id="linksContainer"></div>

        <md-text-button type="button" id="addLinkBtn" onclick="addLinkField()">
          <md-icon slot="icon">add</md-icon>
          Adicionar Link
        </md-text-button>
      </div>

      <div style="display: flex; align-items: center; gap: 8px; margin: 8px 0;">
        <md-checkbox id="pinned"></md-checkbox>
        <label for="pinned">Fixar no topo</label>
      </div>

      <div style="padding:16px; border-radius:12px; background:rgba(255,255,255,0.05);">
        <label>Banner</label>
        <input id="banner" type="file" accept="image/*">
      </div>

    </form>

    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px">
      <md-text-button onclick="closeModal()">Cancelar</md-text-button>
      <md-filled-button onclick="saveGame()">Salvar</md-filled-button>
    </div>

  </md-elevated-card>
</div>

<script src="js/app.js"></script>

</body>
</html>
