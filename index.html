  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1>New Way Community</h1>
      <div style="display: flex; gap: 8px; align-items: center;">
        <md-icon-button id="discord-btn" onclick="window.open('https://discord.gg/W5DUnEUgtj', '_blank')">

          </md-icon>
        </md-icon-button>
        <md-icon-button id="auth-btn" onclick="handleAuthAction()">
          <md-icon id="auth-icon">admin_panel_settings</md-icon>
        </md-icon-button>
        <md-icon-button id="theme-toggle" onclick="cycleTheme()">
          <md-icon id="theme-icon">brightness_auto</md-icon>
        </md-icon-button>
      </div>
    </div>
  </header>

  <div class="search-bar">
    <md-outlined-text-field id="search" label="Pesquisar jogos..." oninput="renderGames()">
      <md-icon slot="leading-icon">search</md-icon>
    </md-outlined-text-field>
  </div>

  <main class="games-grid" id="games">
    <div id="loading-spinner" style="grid-column: 1 / -1; display: flex; justify-content: center; padding: 48px;">
      <md-circular-progress indeterminate></md-circular-progress>
    </div>
  </main>

  <md-fab id="add-btn" onclick="openAddModal()" style="display: none;">
  <md-icon slot="icon">add</md-icon>
</md-fab>

  <div class="modal-overlay" id="login-modal">
    <md-elevated-card class="modal-content">
      <h2 style="margin:0 0 16px 0">Acesso Administrativo</h2>
      <div class="form-scroll">
        <md-outlined-text-field id="login-email" label="Email" type="email"></md-outlined-text-field>
        <md-outlined-text-field id="login-pass" label="Senha" type="password"></md-outlined-text-field>
      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px">
        <md-text-button onclick="closeLoginModal()">Cancelar</md-text-button>
        <md-filled-button onclick="login()">Entrar</md-filled-button>
      </div>
    </md-elevated-card>
  </div>

  <div class="modal-overlay" id="modal">
    <md-elevated-card class="modal-content">
      <h2 id="modalTitle" style="margin:0 0 16px 0">Adicionar Jogo</h2>
      <form id="gameForm" class="form-scroll" onsubmit="event.preventDefault()">
        <input type="hidden" id="gameId">
        <md-outlined-text-field id="name" label="Nome"></md-outlined-text-field>
        <md-outlined-text-field id="desc" label="Descrição" type="textarea" rows="3"></md-outlined-text-field>
        <div id="linksWrapper">
          <p style="font-size:14px; margin:0 0 8px 0; opacity:0.7">Links do Jogo (Máx. 4)</p>
          <div id="linksContainer"></div>
          <md-text-button type="button" id="addLinkBtn" onclick="addLinkField()">
            <md-icon slot="icon">add</md-icon> Adicionar Link
          </md-text-button>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; margin: 8px 0;">
            <md-checkbox id="pinned"></md-checkbox>
            <label for="pinned" style="font-size: 14px;">Fixar no topo</label>
        </div>
        <div style="padding:16px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid var(--md-sys-color-outline-variant);">
          <label style="display:block; margin-bottom:8px; font-size:14px;">Banner</label>
          <input id="banner" type="file" accept="image/*">
        </div>
      </form>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px">
        <md-text-button onclick="closeModal()">Cancelar</md-text-button>
        <md-filled-button onclick="saveGame()" id="saveBtn">Salvar</md-filled-button>
      </div>
    </md-elevated-card>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
