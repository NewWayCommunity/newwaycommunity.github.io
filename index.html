<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Way Community</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script type="module" src="https://esm.run/@material/web/all.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="css/light.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="header-content">
      <h1>New Way Community</h1>
      <md-icon-button id="theme-toggle" onclick="cycleTheme()">
        <md-icon id="theme-icon">brightness_auto</md-icon>
      </md-icon-button>
    </div>
  </header>

  <div class="search-bar">
    <md-outlined-text-field id="search" label="Pesquisar jogos..." oninput="renderGames()">
      <md-icon slot="leading-icon">search</md-icon>
    </md-outlined-text-field>
  </div>

  <main class="games-grid" id="games">
    <div id="loading-spinner" style="grid-column: 1 / -1; display: flex; justify-content: center; padding: 48px;">
      <md-circular-progress indeterminate></md-circular-progress>
    </div>
  </main>

  <md-fab id="add-btn" icon="add" onclick="openAddModal()" label="Adicionar"></md-fab>

  <div class="modal-overlay" id="modal">
    <md-elevated-card class="modal-content">
      <h2 style="margin:0 0 16px 0">Adicionar Jogo</h2>
      <form id="gameForm" class="form-scroll" onsubmit="event.preventDefault()">
        <md-outlined-text-field id="name" label="Nome"></md-outlined-text-field>
        <md-outlined-text-field id="desc" label="Descrição" type="textarea" rows="3"></md-outlined-text-field>
        
        <div id="linksWrapper">
          <p style="font-size:14px; margin:0 0 8px 0; opacity:0.7">Links do Jogo (Máx. 4)</p>
          <div id="linksContainer"></div>
          <md-text-button type="button" id="addLinkBtn" onclick="addLinkField()">
            <md-icon slot="icon">add</md-icon> Adicionar Link
          </md-text-button>
        </div>

        <div style="padding:16px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid var(--md-sys-color-outline-variant);">
          <label style="display:block; margin-bottom:8px; font-size:14px;">Banner do Jogo</label>
          <input id="banner" type="file" accept="image/*">
        </div>
      </form>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px">
        <md-text-button onclick="closeModal()">Cancelar</md-text-button>
        <md-filled-button onclick="saveGame()">Salvar</md-filled-button>
      </div>
    </md-elevated-card>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
