<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Way Community</title>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0d0d0d; color: white; }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      text-shadow: 0 0 10px #8a2eff;
    }

    .search-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1a1a1a;
      color: white;
      box-shadow: 0 0 10px #6a00ff;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 15px rgba(138,46,255,0.3);
    }

    .card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .card-content { padding: 15px; }

    .actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .actions button {
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
    }

    .modal input {
      width: 100%;
      margin: 10px 0;
    }

    .modal button {
      width: 100%;
      padding: 10px;
      background: #6a00ff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6a00ff;
      border: none;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
    }
  </style>
</head>
<body>

<header>🎮 New Way Community</header>

<div class="search-container">
  <input type="text" id="search" placeholder="Pesquisar jogos...">
  <select id="categoryFilter">
    <option value="">Todas categorias</option>
  </select>
</div>

<section class="games" id="games"></section>

<button class="admin-btn" onclick="login()">+</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Adicionar Jogo</h3>
    <input id="name" placeholder="Nome do jogo">
    <input id="desc" placeholder="Descrição">
    <input id="link" placeholder="Link">
    <input id="banner" type="file" accept="image/*">
    <input id="category" placeholder="Categoria">
    <button onclick="saveGame()">Salvar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyALQLuy_gVsnXRkdjLaHQPKLyH_sMBTXCA",
  authDomain: "new-way-community.firebaseapp.com",
  databaseURL: "https://new-way-community-default-rtdb.firebaseio.com",
  projectId: "new-way-community",
  storageBucket: "new-way-community.firebasestorage.app",
  messagingSenderId: "165462675701",
  appId: "1:165462675701:web:0b5a53ada33fad5808f5bc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let games = [];
let isAdmin = false;
let editId = null;

const gamesEl = document.getElementById("games");
const searchInput = document.getElementById("search");
const categoryFilter = document.getElementById("categoryFilter");

function renderGames() {
  const search = searchInput.value.toLowerCase();
  const category = categoryFilter.value;

  gamesEl.innerHTML = "";

  games
    .filter(g => g.name.toLowerCase().includes(search))
    .filter(g => !category || g.category === category)
    .sort((a,b)=> b.date - a.date)
    .forEach(game => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${isAdmin ? `<div class="actions">
          <button onclick="editGame('${game.id}')">✏️</button>
          <button onclick="deleteGame('${game.id}')">🗑️</button>
        </div>` : ""}
        <img src="${game.banner}">
        <div class="card-content">
          <h3>${game.name}</h3>
          <p>${game.desc}</p>
          <p><b>${game.category}</b></p>
          <a href="${game.link}" target="_blank">Acessar</a>
        </div>
      `;

      gamesEl.appendChild(div);
    });
}

function updateCategories() {
  const categories = [...new Set(games.map(g => g.category))];
  categoryFilter.innerHTML = '<option value="">Todas</option>';
  categories.forEach(cat => {
    categoryFilter.innerHTML += `<option>${cat}</option>`;
  });
}

searchInput.addEventListener("input", renderGames);
categoryFilter.addEventListener("change", renderGames);

function login() {
  const senha = prompt("Senha:");
  if (senha === "30218566k!") {
    isAdmin = true;
    document.getElementById("modal").style.display = "flex";
    renderGames();
  }
}

function saveGame() {
  const name = document.getElementById("name").value;
  const desc = document.getElementById("desc").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value;
  const file = document.getElementById("banner").files[0];

  if (!file && !editId) {
    alert("Selecione uma imagem!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = {
      name,
      desc,
      link,
      category,
      banner: file ? e.target.result : games.find(g => g.id === editId).banner,
      date: Date.now()
    };

    if (editId) {
      db.ref("games/" + editId).update(data);
    } else {
      const ref = db.ref("games").push();
      data.id = ref.key;
      ref.set(data);
    }

    document.getElementById("modal").style.display = "none";
    editId = null;
  };

  if (file) {
    reader.readAsDataURL(file);
  } else {
    reader.onload({ target: { result: null } });
  }
}

function deleteGame(id) {
  db.ref("games/" + id).remove();
}

function editGame(id) {
  const game = games.find(g => g.id === id);
  editId = id;

  document.getElementById("name").value = game.name;
  document.getElementById("desc").value = game.desc;
  document.getElementById("link").value = game.link;
  document.getElementById("category").value = game.category;

  document.getElementById("modal").style.display = "flex";
}

db.ref("games").on("value", snapshot => {
  const data = snapshot.val() || {};
  games = Object.values(data);
  renderGames();
  updateCategories();
});
</script>

</body>
</html>
