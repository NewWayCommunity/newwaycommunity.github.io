<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Way Community</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #0d0d0d; color: white; }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      text-shadow: 0 0 10px #8a2eff;
    }

    .search-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1a1a1a;
      color: white;
      box-shadow: 0 0 10px #6a00ff;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 15px rgba(138,46,255,0.3);
    }

    .card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .card-content { padding: 15px; }

    .actions {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .actions button {
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      position: relative;
    }

    .modal input {
      width: 100%;
      margin: 10px 0;
    }

    .modal button {
      width: 100%;
      padding: 10px;
      background: #6a00ff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .admin-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #6a00ff;
      border: none;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      color: white;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      cursor: pointer;
    }

    .add-link-btn {
      margin-top: 5px;
      background: #8a2eff;
    }

    .link-btn {
      display: inline-block;
      margin-top: 5px;
      padding: 6px 10px;
      background: #6a00ff;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      margin-right: 5px;
    }
  </style>
</head>
<body>

<header>🎮 New Way Community</header>

<div class="search-container">
  <input type="text" id="search" placeholder="Pesquisar jogos...">
  <select id="categoryFilter">
    <option value="">Todas categorias</option>
  </select>
</div>

<section class="games" id="games"></section>

<button class="admin-btn" onclick="login()">+</button>
<button class="admin-btn" onclick="logout()" style="right:80px;">⛔</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Adicionar Jogo</h3>

    <span class="close-btn" onclick="closeModal()">✖</span>

    <input id="name" placeholder="Nome do jogo">
    <input id="desc" placeholder="Descrição">

    <div id="linksContainer">
      <input class="link-input" placeholder="Link">
    </div>

    <button class="add-link-btn" onclick="addLinkField()">+ Adicionar Link</button>

    <input id="banner" type="file" accept="image/*">
    <input id="category" placeholder="Categoria">
    <button onclick="saveGame()">Salvar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyALQLuy_gVsnXRkdjLaHQPKLyH_sMBTXCA",
  authDomain: "new-way-community.firebaseapp.com",
  databaseURL: "https://new-way-community-default-rtdb.firebaseio.com",
  projectId: "new-way-community",
  storageBucket: "new-way-community.firebasestorage.app",
  messagingSenderId: "165462675701",
  appId: "1:165462675701:web:2d1312c284461d5808f5bc",
  measurementId: "G-630ZEM4FR4"
};

firebase.initializeApp(firebaseConfig);
firebase.analytics();

const db = firebase.database();

let games = [];
let isAdmin = false;

const gamesEl = document.getElementById("games");

firebase.auth().onAuthStateChanged(user => {
  isAdmin = !!user;
  renderGames();
});

function login() {
  const email = prompt("Email:");
  const senha = prompt("Senha:");

  firebase.auth().signInWithEmailAndPassword(email, senha)
    .then(() => {
      document.getElementById("modal").style.display = "flex";
    })
    .catch(() => alert("Login inválido"));
}

function logout() {
  firebase.auth().signOut();
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function addLinkField() {
  const container = document.getElementById("linksContainer");
  const input = document.createElement("input");
  input.className = "link-input";
  input.placeholder = "Link adicional";
  container.appendChild(input);
}

function renderGames() {
  gamesEl.innerHTML = "";

  games.forEach(game => {
    const div = document.createElement("div");
    div.className = "card";

    const linksHTML = (game.links || []).map((l,i) =>
      `<a href="${l}" target="_blank" class="link-btn">Link ${i+1}</a>`
    ).join("");

    div.innerHTML = `
      ${isAdmin ? `<div class="actions">
        <button onclick="editGame('${game.id}')">✏️</button>
        <button onclick="deleteGame('${game.id}')">🗑️</button>
      </div>` : ""}
      <img src="${game.banner}">
      <div class="card-content">
        <h3>${game.name}</h3>
        <p>${game.desc}</p>
        ${linksHTML}
      </div>
    `;

    gamesEl.appendChild(div);
  });
}

function saveGame() {
  const links = Array.from(document.querySelectorAll(".link-input"))
    .map(i => i.value)
    .filter(v => v);

  const file = document.getElementById("banner").files[0];

  const reader = new FileReader();

  reader.onload = function(e) {
    const data = {
      name: name.value,
      desc: desc.value,
      links: links,
      category: category.value,
      banner: e.target.result,
      date: Date.now()
    };

    const ref = db.ref("games").push();
    data.id = ref.key;
    ref.set(data);

    closeModal();
  };

  reader.readAsDataURL(file);
}

function deleteGame(id) {
  db.ref("games/" + id).remove();
}

function editGame(id) {
  alert("Edição simples por enquanto");
}

db.ref("games").on("value", snapshot => {
  const data = snapshot.val() || {};
  games = Object.values(data);
  renderGames();
});
</script>

</body>
</html>
